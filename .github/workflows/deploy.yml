# ═══════════════════════════════════════════════════════════════════
#  GitHub Secrets sozlash (Settings → Secrets → Actions):
#
#  EC2_HOST               — EC2 public IP (masalan: 54.12.34.56)
#  EC2_USER               — SSH foydalanuvchi (Ubuntu uchun: ubuntu)
#  EC2_SSH_KEY            — .pem formatidagi private SSH kalit (to'liq matn)
#  DJANGO_SECRET_KEY      — Django secret key (50+ tasodifiy belgi)
#  ALLOWED_HOSTS          — Vergul bilan: 54.12.34.56,uzbekai.uz,www.uzbekai.uz
#  DJANGO_SUPERUSER_NAME  — Admin login (masalan: admin)
#  DJANGO_SUPERUSER_PASS  — Admin parol (masalan: admin123)
#  DJANGO_SUPERUSER_EMAIL — Admin email (masalan: admin@uzbekai.uz)
# ═══════════════════════════════════════════════════════════════════

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  # ─── 1. Test ──────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.13'
          cache: 'pip'

      - name: Kutubxonalar o'rnatish
        run: pip install -r requirements.txt

      - name: Django check va testlar
        run: |
          python manage.py check
          python manage.py test --verbosity=2
        env:
          DJANGO_SECRET_KEY: ci-test-secret-key-not-for-production
          ALLOWED_HOSTS: localhost
          DEBUG: '1'

  # ─── 2. Docker image build va ghcr.io ga p1ush ─────────────────────
  build-push:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=raw,value=latest

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}

  # ─── 3. EC2 ga deploy ────────────────────────────────────────────
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: build-push
    permissions:
      packages: read
    steps:
      - name: Server sozlash va deploy
        uses: appleboy/ssh-action@v1
        env:
          DOCKER_IMAGE: ghcr.io/${{ github.repository }}
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ github.repository }}
          DJANGO_SECRET_KEY: ${{ secrets.DJANGO_SECRET_KEY }}
          ALLOWED_HOSTS: ${{ secrets.ALLOWED_HOSTS }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          DJANGO_SUPERUSER_NAME: ${{ secrets.DJANGO_SUPERUSER_NAME }}
          DJANGO_SUPERUSER_PASS: ${{ secrets.DJANGO_SUPERUSER_PASS }}
          DJANGO_SUPERUSER_EMAIL: ${{ secrets.DJANGO_SUPERUSER_EMAIL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          command_timeout: 15m
          debug: true
          envs: DOCKER_IMAGE,GITHUB_ACTOR,GITHUB_TOKEN,GITHUB_REPO,DJANGO_SECRET_KEY,ALLOWED_HOSTS,EC2_HOST,DJANGO_SUPERUSER_NAME,DJANGO_SUPERUSER_PASS,DJANGO_SUPERUSER_EMAIL
          script: |
            set -euo pipefail
            DEPLOY_DIR="/opt/coffee-restaurant"
            IMAGE="${DOCKER_IMAGE,,}"

            # ── 1. Git o'rnatish ──────────────────────────────────────────
            if ! command -v git >/dev/null 2>&1; then
              sudo apt-get update -qq
              sudo apt-get install -y --no-install-recommends git
            fi
            echo ">>> Git: OK"

            # ── 3. Docker o'rnatish ────────────────────────────────────────
            if ! command -v docker >/dev/null 2>&1; then
              echo ">>> Docker o'rnatilmoqda..."
              curl -fsSL https://get.docker.com | sudo sh
              sudo usermod -aG docker "$USER"
              echo ">>> Docker o'rnatildi, yangi sessiya kerak bo'lishi mumkin"
            fi
            echo ">>> Docker: $(sudo docker --version)" 

            # ── 4. Docker Compose plugin o'rnatish ─────────────────────────
            if ! sudo docker compose version >/dev/null 2>&1; then
              echo ">>> Docker Compose o'rnatilmoqda..."
              DOCKER_PLUGIN="/usr/local/lib/docker/cli-plugins"
              sudo mkdir -p "${DOCKER_PLUGIN}"
              sudo curl -SL "https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64" \
                -o "${DOCKER_PLUGIN}/docker-compose"
              sudo chmod +x "${DOCKER_PLUGIN}/docker-compose"
            fi
            echo ">>> Docker Compose: $(sudo docker compose version)"

            # ── 5. ghcr.io ga login ────────────────────────────────────────
            echo "${GITHUB_TOKEN}" | sudo docker login ghcr.io -u "${GITHUB_ACTOR}" --password-stdin
            echo ">>> ghcr.io: OK"

            # ── 6. Repo clone yoki pull ────────────────────────────────────
            sudo mkdir -p "${DEPLOY_DIR}"
            sudo chown -R "$USER:$USER" "${DEPLOY_DIR}"

            if [ -d "${DEPLOY_DIR}/.git" ]; then
              echo ">>> Repo yangilanmoqda..."
              git -C "${DEPLOY_DIR}" remote set-url origin \
                "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git"
              git -C "${DEPLOY_DIR}" fetch origin main --quiet
              git -C "${DEPLOY_DIR}" reset --hard origin/main
              git -C "${DEPLOY_DIR}" remote set-url origin \
                "https://github.com/${GITHUB_REPO}.git"
            else
              echo ">>> Repo clone qilinmoqda..."
              git clone --depth 1 \
                "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPO}.git" \
                "${DEPLOY_DIR}"
              git -C "${DEPLOY_DIR}" remote set-url origin \
                "https://github.com/${GITHUB_REPO}.git"
            fi
            echo ">>> Repo: OK"

            # ── 7. .env fayl yaratish ──────────────────────────────────────
            # Always include the production domains alongside whatever is in the secret
            FULL_HOSTS="${ALLOWED_HOSTS},uzbekai.uz,www.uzbekai.uz"
            # CSRF_TRUSTED_ORIGINS: ALLOWED_HOSTS dagi har bir hostni https:// bilan
            CSRF_ORIGINS=$(echo "${FULL_HOSTS}" | tr ',' '\n' | sort -u | sed 's|^|https://|' | paste -sd ',')
            printf 'DOCKER_IMAGE=%s\nDJANGO_SECRET_KEY=%s\nALLOWED_HOSTS=%s\nCSRF_TRUSTED_ORIGINS=%s\n' \
              "${IMAGE}" "${DJANGO_SECRET_KEY}" "${FULL_HOSTS}" "${CSRF_ORIGINS}" \
              > "${DEPLOY_DIR}/.env"
            chmod 600 "${DEPLOY_DIR}/.env"
            echo ">>> .env: OK"

            # ── 8. Docker Compose orqali ishga tushirish ───────────────────
            cd "${DEPLOY_DIR}"
            sudo docker pull "${IMAGE}:latest"
            COMPOSE_EXIT=0
            sudo docker compose -f docker-compose.prod.yml up -d --remove-orphans --force-recreate || COMPOSE_EXIT=$?
            echo ">>> Konteynerlar: Started (docker compose exit ${COMPOSE_EXIT})"

            # ── 8.1. Superuser yaratish (agar yo'q bo'lsa) ─────────────────
            sleep 5
            sudo docker compose -f docker-compose.prod.yml exec -T web \
              sh -c "DJANGO_SUPERUSER_USERNAME='${DJANGO_SUPERUSER_NAME}' \
                     DJANGO_SUPERUSER_PASSWORD='${DJANGO_SUPERUSER_PASS}' \
                     DJANGO_SUPERUSER_EMAIL='${DJANGO_SUPERUSER_EMAIL}' \
                     python manage.py createsuperuser --noinput 2>/dev/null || true"
            echo ">>> Superuser: OK (allaqachon mavjud bo'lsa o'zgartirilmadi)"

            # ── 9. Healthcheck validation va diagnostics ──────────────────
            echo ""
            echo ">>> Healthcheck validation..."
            sleep 8

            COMPOSE_FAILED=false
            UNHEALTHY=false
            if [ "${COMPOSE_EXIT}" -ne 0 ]; then
              COMPOSE_FAILED=true
              echo "⚠️ docker compose failed with exit code ${COMPOSE_EXIT}"
            fi

            # Get container health status
            CONTAINER_EXISTS=$(sudo docker ps -a | grep coffee-restaurant-web-1 | wc -l)
            if [ "${CONTAINER_EXISTS}" -eq 0 ]; then
              echo "❌ ERROR: Container coffee-restaurant-web-1 does not exist!"
              echo ""
              echo "=== Docker PS -A ==="
              sudo docker ps -a
              exit 1
            fi

            # Check health status
            for i in {1..20}; do
              HEALTH=$(sudo docker inspect coffee-restaurant-web-1 --format='{{.State.Health.Status}}' 2>/dev/null || echo "unknown")
              if [ "${HEALTH}" = "healthy" ]; then
                echo "✅ Container health status: ${HEALTH}"
                break
              elif [ "${HEALTH}" = "unhealthy" ]; then
                echo "❌ Container health status: UNHEALTHY"
                UNHEALTHY=true
                break
              else
                echo "    Attempt $i/20: Health status = ${HEALTH}"
                sleep 3
              fi
            done

            if [ "${HEALTH}" != "healthy" ] && [ "${UNHEALTHY}" != "true" ]; then
              echo "❌ Container health status did not become healthy (last status=${HEALTH})"
              UNHEALTHY=true
            fi

            if [ "${COMPOSE_FAILED}" = "true" ] || [ "${UNHEALTHY}" = "true" ]; then
              echo ""
              echo "╔════════════════════════════════════════════════════════════╗"
              echo "║          CONTAINER UNHEALTHY - COLLECTING DIAGNOSTICS      ║"
              echo "╚════════════════════════════════════════════════════════════╝"
              echo ""

              echo "=== 1. Docker PS -A ==="
              sudo docker ps -a
              echo ""

              echo "=== 2. Container Logs (Last 150 lines) ==="
              sudo docker logs coffee-restaurant-web-1 2>&1 | tail -150
              echo ""

              echo "=== 3. Container State Inspector ==="
              sudo docker inspect coffee-restaurant-web-1 --format='Health: {{.State.Health.Status}}
              Exit Code: {{.State.ExitCode}}
              Status: {{.State.Status}}
              Error: {{.State.Error}}'
              echo ""

              echo "=== 3.1 Healthcheck Log ==="
              sudo docker inspect coffee-restaurant-web-1 --format='{{range .State.Health.Log}}Start={{.Start}} End={{.End}} exit={{.ExitCode}} output={{printf "%s\n" .Output}}{{end}}'
              echo ""

              echo "=== 4. Docker Compose Logs ==="
              sudo docker compose -f docker-compose.prod.yml logs 2>&1 | tail -100
              echo ""

              echo "=== 5. Docker Compose Logs for web ==="
              sudo docker compose -f docker-compose.prod.yml logs web 2>&1 | tail -100
              echo ""

              echo "╔════════════════════════════════════════════════════════════╗"
              echo "║  DEPLOYMENT FAILED - Container did not become healthy      ║"
              echo "╚════════════════════════════════════════════════════════════╝"
              exit 1
            fi

            sudo docker system prune -f
            echo ">>> Konteynerlar: OK"

            echo ""
            echo "DEPLOY MUVAFFAQIYATLI YAKUNLANDI!"
            echo "URL: http://${EC2_HOST}"
