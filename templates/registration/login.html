<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish | Brew &amp; Bloom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a0a05 0%, #2c1810 45%, #3d2010 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Floating coffee beans */
        .bg-canvas {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .bean {
            position: absolute;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            background: rgba(212, 167, 98, 0.055);
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0%   { transform: translateY(105vh) rotate(0deg);   opacity: 0; }
            8%   { opacity: 1; }
            92%  { opacity: 1; }
            100% { transform: translateY(-8vh)  rotate(700deg); opacity: 0; }
        }

        /* Glow orbs */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(90px);
            pointer-events: none;
        }
        .orb-1 {
            width: 400px; height: 400px;
            background: rgba(139, 69, 19, 0.18);
            top: -100px; left: -100px;
        }
        .orb-2 {
            width: 350px; height: 350px;
            background: rgba(212, 167, 98, 0.10);
            bottom: -80px; right: -80px;
        }

        /* Card */
        .login-card {
            background: rgba(255, 255, 255, 0.975);
            border-radius: 24px;
            padding: 2.8rem 2.5rem 2.4rem;
            width: 100%;
            max-width: 410px;
            box-shadow:
                0 30px 80px rgba(0, 0, 0, 0.45),
                0 0 0 1px rgba(255, 255, 255, 0.08);
            position: relative;
            z-index: 10;
            animation: cardIn 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes cardIn {
            from { transform: translateY(28px) scale(0.97); opacity: 0; }
            to   { transform: translateY(0)    scale(1);    opacity: 1; }
        }

        /* Brand */
        .brand-icon {
            width: 68px; height: 68px;
            background: linear-gradient(135deg, #8b4513 0%, #c97c2e 100%);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 1.4rem;
            box-shadow: 0 8px 24px rgba(139, 69, 19, 0.38);
        }
        .brand-icon i { font-size: 1.9rem; color: #fff; }

        .brand-name {
            text-align: center;
            font-size: 1.55rem;
            font-weight: 700;
            color: #2c1810;
            letter-spacing: -0.4px;
            margin-bottom: 0.2rem;
        }
        .brand-tagline {
            text-align: center;
            color: #9a8070;
            font-size: 0.82rem;
            margin-bottom: 2rem;
            letter-spacing: 0.01em;
        }

        /* Form */
        .field-label {
            display: block;
            font-size: 0.75rem;
            font-weight: 700;
            color: #4a2c1a;
            text-transform: uppercase;
            letter-spacing: 0.07em;
            margin-bottom: 0.45rem;
        }

        .field-wrap {
            position: relative;
            margin-bottom: 1.2rem;
        }

        .field-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #b09080;
            font-size: 0.9rem;
            pointer-events: none;
            transition: color 0.2s;
        }

        .field-wrap:focus-within .field-icon { color: #8b4513; }

        .form-control {
            width: 100%;
            padding: 0.78rem 2.6rem 0.78rem 2.7rem;
            border: 2px solid #e8ddd5;
            border-radius: 12px;
            font-size: 0.95rem;
            color: #2c1810;
            background: #faf8f5;
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }

        .form-control::placeholder { color: #c4b0a0; }

        .form-control:focus {
            border-color: #d4a762;
            background: #fff;
            box-shadow: 0 0 0 4px rgba(212, 167, 98, 0.14);
            outline: none;
        }

        .form-control.is-invalid {
            border-color: #e53935;
            background: #fff8f8;
        }

        .eye-btn {
            position: absolute;
            right: 13px;
            top: 50%;
            transform: translateY(-50%);
            color: #b09080;
            background: none;
            border: none;
            cursor: pointer;
            padding: 2px 4px;
            font-size: 0.9rem;
            transition: color 0.2s;
            line-height: 1;
        }
        .eye-btn:hover { color: #8b4513; }

        /* Error */
        .error-box {
            background: #fff4f4;
            border: 1.5px solid #ffd0ce;
            border-left: 4px solid #e53935;
            border-radius: 10px;
            padding: 0.7rem 1rem;
            margin-bottom: 1.2rem;
            color: #b71c1c;
            font-size: 0.855rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        /* Submit */
        .btn-signin {
            width: 100%;
            padding: 0.82rem;
            background: linear-gradient(135deg, #8b4513 0%, #a3521b 100%);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 0.97rem;
            font-weight: 600;
            letter-spacing: 0.02em;
            cursor: pointer;
            transition: transform 0.18s, box-shadow 0.18s, filter 0.18s;
            box-shadow: 0 4px 18px rgba(139, 69, 19, 0.38);
            margin-top: 0.4rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .btn-signin:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 24px rgba(139, 69, 19, 0.48);
            filter: brightness(1.05);
        }

        .btn-signin:active { transform: translateY(0); }

        /* Footer */
        .card-footer-text {
            text-align: center;
            color: #c4b0a0;
            font-size: 0.78rem;
            margin-top: 1.8rem;
        }

        /* Divider */
        .divider-line {
            border: none;
            border-top: 1px solid #f0e8e0;
            margin: 1.6rem 0 1.4rem;
        }

        /* Credentials hint box */
        .hint-box {
            background: linear-gradient(135deg, #fdf6ee, #faf0e4);
            border: 1.5px solid #e8d5b7;
            border-radius: 10px;
            padding: 0.65rem 1rem;
            font-size: 0.8rem;
            color: #7a5530;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .hint-box strong { color: #5a3010; }
    </style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="bg-canvas" id="bgCanvas"></div>

<div class="login-card">

    <div class="brand-icon">
        <i class="fas fa-mug-hot"></i>
    </div>
    <div class="brand-name">Brew &amp; Bloom</div>
    <div class="brand-tagline">Boshqaruv tizimiga xush kelibsiz</div>

    {% if form.errors %}
    <div class="error-box">
        <i class="fas fa-circle-exclamation"></i>
        Login yoki parol noto'g'ri. Qaytadan urinib ko'ring.
    </div>
    {% endif %}

    <form method="post" autocomplete="on">
        {% csrf_token %}
        {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}

        <label class="field-label" for="id_username">Foydalanuvchi nomi</label>
        <div class="field-wrap">
            <input
                type="text"
                name="username"
                id="id_username"
                class="form-control {% if form.errors %}is-invalid{% endif %}"
                placeholder="admin"
                autocomplete="username"
                autofocus
                required
            >
            <i class="fas fa-user field-icon"></i>
        </div>

        <label class="field-label" for="id_password">Parol</label>
        <div class="field-wrap">
            <input
                type="password"
                name="password"
                id="id_password"
                class="form-control {% if form.errors %}is-invalid{% endif %}"
                placeholder="••••••••"
                autocomplete="current-password"
                required
            >
            <i class="fas fa-lock field-icon"></i>
            <button type="button" class="eye-btn" id="eyeBtn" title="Parolni ko'rsatish" onclick="togglePwd()">
                <i class="fas fa-eye" id="eyeIcon"></i>
            </button>
        </div>

        <button type="submit" class="btn-signin">
            <i class="fas fa-right-to-bracket"></i>
            Kirish
        </button>
    </form>

    <hr class="divider-line">

    <div class="hint-box">
        <i class="fas fa-circle-info"></i>
        <span>Login: <strong>admin</strong> &nbsp;|&nbsp; Parol: <strong>admin123</strong></span>
    </div>

    <div class="card-footer-text">
        Brew &amp; Bloom CRM &amp; ERP &copy; 2025
    </div>
</div>

<script>
(function () {
    const canvas = document.getElementById('bgCanvas');
    for (let i = 0; i < 20; i++) {
        const b = document.createElement('div');
        b.className = 'bean';
        const size = Math.random() * 18 + 9;
        b.style.cssText = `
            left:${Math.random() * 100}%;
            width:${size}px;
            height:${size * 1.45}px;
            animation-duration:${Math.random() * 18 + 10}s;
            animation-delay:${Math.random() * 18}s;
        `;
        canvas.appendChild(b);
    }
})();

function togglePwd() {
    const inp = document.getElementById('id_password');
    const ico = document.getElementById('eyeIcon');
    if (inp.type === 'password') {
        inp.type = 'text';
        ico.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        inp.type = 'password';
        ico.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>
</body>
</html>
