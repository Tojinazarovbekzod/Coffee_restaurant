<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kirish | TRADE</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-base: #0c0a18;
            --text-primary: #f3f1fa;
            --text-muted: #9b96b5;
            --text-faint: #716c8a;
            --accent-teal: #2dd4bf;
            --accent-purple: #8b5cf6;
            --accent-pink: #ec4899;
            --border-soft: rgba(255,255,255,0.08);
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            background:
                radial-gradient(circle at 12% -10%, rgba(139,92,246,.28), transparent 42%),
                radial-gradient(circle at 92% 12%, rgba(45,212,191,.18), transparent 40%),
                radial-gradient(circle at 50% 120%, rgba(236,72,153,.14), transparent 48%),
                var(--bg-base);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
            position: relative;
        }

        /* Floating cargo crates */
        .bg-canvas { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
        .crate {
            position: absolute;
            border-radius: 4px;
            background: rgba(139, 92, 246, 0.07);
            border: 1px solid rgba(255,255,255,0.04);
            animation: floatUp linear infinite;
        }
        @keyframes floatUp {
            0%   { transform: translateY(105vh) rotate(0deg);   opacity: 0; }
            8%   { opacity: 1; }
            92%  { opacity: 1; }
            100% { transform: translateY(-8vh)  rotate(360deg); opacity: 0; }
        }

        /* Card */
        .login-card {
            background: rgba(255, 255, 255, 0.045);
            border: 1px solid var(--border-soft);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border-radius: 24px;
            padding: 2.8rem 2.5rem 2.4rem;
            width: 100%;
            max-width: 410px;
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.45);
            position: relative;
            z-index: 10;
            animation: cardIn 0.55s cubic-bezier(0.16, 1, 0.3, 1) both;
        }
        @keyframes cardIn {
            from { transform: translateY(28px) scale(0.97); opacity: 0; }
            to   { transform: translateY(0)    scale(1);    opacity: 1; }
        }

        /* Brand */
        .brand-icon {
            width: 60px; height: 60px;
            background: linear-gradient(135deg, var(--accent-teal), var(--accent-purple));
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.2rem;
            box-shadow: 0 10px 28px rgba(139,92,246,.4);
            color: #fff; font-weight: 800; font-size: 1.5rem;
        }
        .brand-name { text-align: center; font-size: 1.5rem; font-weight: 800; letter-spacing: .16em; color: var(--text-primary); margin-bottom: .25rem; }
        .brand-tagline { text-align: center; color: var(--text-muted); font-size: 0.82rem; margin-bottom: 2rem; letter-spacing: 0.01em; }

        /* Form */
        .field-label { display: block; font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 0.45rem; }
        .field-wrap { position: relative; margin-bottom: 1.2rem; }
        .field-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-faint); font-size: 0.9rem; pointer-events: none; transition: color 0.2s; }
        .field-wrap:focus-within .field-icon { color: var(--accent-teal); }

        .form-control {
            width: 100%; padding: 0.78rem 2.6rem 0.78rem 2.7rem;
            border: 1.5px solid var(--border-soft); border-radius: 12px;
            font-size: 0.95rem; color: var(--text-primary);
            background: rgba(255,255,255,0.04);
            transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
        }
        .form-control::placeholder { color: var(--text-faint); }
        .form-control:focus {
            border-color: var(--accent-purple);
            background: rgba(255,255,255,0.06);
            box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.16);
            outline: none; color: var(--text-primary);
        }
        .form-control.is-invalid { border-color: #ef4444; background: rgba(239,68,68,0.06); }

        .eye-btn {
            position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
            color: var(--text-faint); background: none; border: none; cursor: pointer;
            padding: 2px 4px; font-size: 0.9rem; transition: color 0.2s; line-height: 1;
        }
        .eye-btn:hover { color: var(--accent-teal); }

        /* Error */
        .error-box {
            background: rgba(239,68,68,0.08); border: 1.5px solid rgba(239,68,68,0.3);
            border-left: 4px solid #ef4444; border-radius: 10px;
            padding: 0.7rem 1rem; margin-bottom: 1.2rem;
            color: #fca5a5; font-size: 0.855rem;
            display: flex; align-items: center; gap: 0.5rem;
        }

        /* Submit */
        .btn-signin {
            width: 100%; padding: 0.82rem;
            background: linear-gradient(135deg, var(--accent-teal) 0%, var(--accent-purple) 100%);
            color: #fff; border: none; border-radius: 12px;
            font-size: 0.97rem; font-weight: 700; letter-spacing: 0.02em;
            cursor: pointer; transition: transform 0.18s, box-shadow 0.18s, filter 0.18s;
            box-shadow: 0 4px 18px rgba(139, 92, 246, 0.38);
            margin-top: 0.4rem;
            display: flex; align-items: center; justify-content: center; gap: 0.5rem;
        }
        .btn-signin:hover { transform: translateY(-2px); box-shadow: 0 7px 24px rgba(139, 92, 246, 0.5); filter: brightness(1.08); }
        .btn-signin:active { transform: translateY(0); }

        /* Footer */
        .card-footer-text { text-align: center; color: var(--text-faint); font-size: 0.78rem; margin-top: 1.8rem; }
        .divider-line { border: none; border-top: 1px solid var(--border-soft); margin: 1.6rem 0 1.4rem; }

        /* Credentials hint box */
        .hint-box {
            background: rgba(45, 212, 191, 0.07);
            border: 1.5px solid rgba(45, 212, 191, 0.22);
            border-radius: 10px; padding: 0.65rem 1rem; font-size: 0.8rem;
            color: var(--text-muted);
            display: flex; align-items: center; gap: 0.5rem;
        }
        .hint-box strong { color: var(--text-primary); }
    </style>
</head>
<body>

<div class="bg-canvas" id="bgCanvas"></div>

<div class="login-card">

    <div class="brand-icon">T</div>
    <div class="brand-name">TRADE</div>
    <div class="brand-tagline">Ulgurji savdo CRM &amp; ERP — Aurora Console</div>

    {% if form.errors %}
    <div class="error-box">
        <i class="fas fa-circle-exclamation"></i>
        Login yoki parol noto'g'ri. Qaytadan urinib ko'ring.
    </div>
    {% endif %}

    <form method="post" autocomplete="on">
        {% csrf_token %}
        {% if next %}<input type="hidden" name="next" value="{{ next }}">{% endif %}

        <label class="field-label" for="id_username">Foydalanuvchi nomi</label>
        <div class="field-wrap">
            <input
                type="text"
                name="username"
                id="id_username"
                class="form-control {% if form.errors %}is-invalid{% endif %}"
                placeholder="admin"
                value="{{ form.username.value|default_if_none:'' }}"
                autocomplete="username"
                autofocus
                required
            >
            <i class="fas fa-user field-icon"></i>
        </div>

        <label class="field-label" for="id_password">Parol</label>
        <div class="field-wrap">
            <input
                type="password"
                name="password"
                id="id_password"
                class="form-control {% if form.errors %}is-invalid{% endif %}"
                placeholder="••••••••"
                autocomplete="current-password"
                required
            >
            <i class="fas fa-lock field-icon"></i>
            <button type="button" class="eye-btn" id="eyeBtn" title="Parolni ko'rsatish" onclick="togglePwd()">
                <i class="fas fa-eye" id="eyeIcon"></i>
            </button>
        </div>

        <button type="submit" class="btn-signin">
            <i class="fas fa-right-to-bracket"></i>
            Kirish
        </button>
    </form>

    <hr class="divider-line">

    <div class="hint-box">
        <i class="fas fa-circle-info"></i>
        <span>Login: <strong>admin</strong> &nbsp;|&nbsp; Parol: <strong>admin123</strong></span>
    </div>

    <div class="card-footer-text">
        TRADE &middot; Aurora Console &copy; 2026
    </div>
</div>

<script>
(function () {
    const canvas = document.getElementById('bgCanvas');
    for (let i = 0; i < 20; i++) {
        const b = document.createElement('div');
        b.className = 'crate';
        const size = Math.random() * 20 + 12;
        b.style.cssText = `
            left:${Math.random() * 100}%;
            width:${size}px;
            height:${size}px;
            animation-duration:${Math.random() * 18 + 10}s;
            animation-delay:${Math.random() * 18}s;
        `;
        canvas.appendChild(b);
    }
})();

function togglePwd() {
    const inp = document.getElementById('id_password');
    const ico = document.getElementById('eyeIcon');
    if (inp.type === 'password') {
        inp.type = 'text';
        ico.classList.replace('fa-eye', 'fa-eye-slash');
    } else {
        inp.type = 'password';
        ico.classList.replace('fa-eye-slash', 'fa-eye');
    }
}
</script>
</body>
</html>
