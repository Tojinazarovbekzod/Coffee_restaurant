{% extends 'erp/base.html' %}
{% block title %}Moliyaviy yozuv qo'shish{% endblock %}
{% block content %}
<div class="page-header">
    <a href="{% url 'erp:moliya' %}" class="text-muted small text-decoration-none"><i class="fas fa-arrow-left me-1"></i>Moliya</a>
    <h4 class="mb-0 mt-1">Moliyaviy yozuv qo'shish</h4>
</div>
<div class="card p-4" style="max-width:450px">
    <form method="post">
        {% csrf_token %}
        <div class="mb-3"><label class="form-label fw-semibold">Tur</label>{{ form.tur }}</div>
        <div class="mb-3"><label class="form-label fw-semibold">Summa (so'm)</label>{{ form.summa }}</div>
        <div class="mb-3"><label class="form-label fw-semibold">Tavsif</label>{{ form.tavsif }}</div>
        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-brown"><i class="fas fa-save me-1"></i>Saqlash</button>
            <a href="{% url 'erp:moliya' %}" class="btn btn-outline-secondary">Bekor qilish</a>
        </div>
    </form>
</div>
{% endblock %}
