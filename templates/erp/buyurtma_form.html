{% extends 'erp/base.html' %}
{% block title %}Yangi buyurtma{% endblock %}
{% block content %}
<div class="page-header">
    <a href="{% url 'erp:buyurtmalar' %}" class="text-muted small text-decoration-none"><i class="fas fa-arrow-left me-1"></i>Buyurtmalar</a>
    <h4 class="mb-0 mt-1">Yangi buyurtma</h4>
</div>
<div class="card p-4" style="max-width:500px">
    <form method="post">
        {% csrf_token %}
        <div class="mb-3"><label class="form-label fw-semibold">Mijoz ismi</label>{{ form.mijoz_ism }}</div>
        <div class="mb-3"><label class="form-label fw-semibold">Holat</label>{{ form.holat }}</div>
        <div class="mb-3"><label class="form-label fw-semibold">Izoh</label>{{ form.izoh }}</div>
        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-brown"><i class="fas fa-save me-1"></i>Saqlash</button>
            <a href="{% url 'erp:buyurtmalar' %}" class="btn btn-outline-secondary">Bekor qilish</a>
        </div>
    </form>
</div>
{% endblock %}
