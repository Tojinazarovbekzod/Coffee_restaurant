{% extends 'erp/base.html' %}
{% block title %}{{ sarlavha }}{% endblock %}
{% block content %}
<div class="page-header">
    <a href="{% url 'erp:mahsulotlar' %}" class="text-muted small text-decoration-none"><i class="fas fa-arrow-left me-1"></i>Inventar</a>
    <h4 class="mb-0 mt-1">{{ sarlavha }}</h4>
</div>
<div class="card p-4" style="max-width:500px">
    <form method="post">
        {% csrf_token %}
        <div class="mb-3"><label class="form-label fw-semibold">Nomi</label>{{ form.nom }}</div>
        <div class="row g-3 mb-3">
            <div class="col-6"><label class="form-label fw-semibold">Miqdori</label>{{ form.miqdor }}</div>
            <div class="col-6"><label class="form-label fw-semibold">Birlik</label>{{ form.birlik }}</div>
        </div>
        <div class="mb-3"><label class="form-label fw-semibold">Minimal miqdor</label>{{ form.minimal_miqdor }}</div>
        <div class="mb-3"><label class="form-label fw-semibold">Narxi (so'm)</label>{{ form.narx }}</div>
        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-brown"><i class="fas fa-save me-1"></i>Saqlash</button>
            <a href="{% url 'erp:mahsulotlar' %}" class="btn btn-outline-secondary">Bekor qilish</a>
        </div>
    </form>
</div>
{% endblock %}
