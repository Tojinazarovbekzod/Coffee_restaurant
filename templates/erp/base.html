<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ERP{% endblock %} | Brew & Bloom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(180deg, #2c1810 0%, #4a2c1a 100%);
            width: 240px;
            position: fixed;
            top: 0; left: 0;
            z-index: 100;
            padding-top: 1rem;
        }
        .sidebar .brand { color: #d4a762; font-weight: 700; font-size: 1.1rem; padding: 1rem 1.5rem 1.5rem; border-bottom: 1px solid #4a3020; }
        .sidebar .nav-link { color: #c9b99a; padding: .6rem 1.5rem; font-size: .9rem; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(212,167,98,.15); border-left: 3px solid #d4a762; }
        .sidebar .nav-section { color: #8a7060; font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; padding: 1rem 1.5rem .3rem; }
        .main-content { margin-left: 240px; padding: 2rem; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
        .stat-card { border-radius: 12px; padding: 1.5rem; color: white; }
        .page-header { background: white; border-radius: 12px; padding: 1.5rem 2rem; margin-bottom: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
        .btn-brown { background: #8b4513; color: white; border: none; }
        .btn-brown:hover { background: #6b3410; color: white; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><i class="fas fa-coffee me-2"></i>Brew & Bloom</div>
    <div class="nav-section">CRM</div>
    <a href="{% url 'crm:dashboard' %}" class="nav-link d-block">
        <i class="fas fa-tachometer-alt me-2"></i>CRM Paneli
    </a>
    <a href="{% url 'crm:mijozlar' %}" class="nav-link d-block">
        <i class="fas fa-users me-2"></i>Mijozlar
    </a>
    <div class="nav-section">ERP</div>
    <a href="{% url 'erp:dashboard' %}" class="nav-link d-block {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
        <i class="fas fa-chart-line me-2"></i>ERP Paneli
    </a>
    <a href="{% url 'erp:mahsulotlar' %}" class="nav-link d-block {% if 'mahsulot' in request.resolver_match.url_name %}active{% endif %}">
        <i class="fas fa-boxes me-2"></i>Inventar
    </a>
    <a href="{% url 'erp:buyurtmalar' %}" class="nav-link d-block {% if 'buyurtma' in request.resolver_match.url_name %}active{% endif %}">
        <i class="fas fa-receipt me-2"></i>Buyurtmalar
    </a>
    <a href="{% url 'erp:xodimlar' %}" class="nav-link d-block {% if 'xodim' in request.resolver_match.url_name %}active{% endif %}">
        <i class="fas fa-id-badge me-2"></i>Xodimlar
    </a>
    <a href="{% url 'erp:moliya' %}" class="nav-link d-block {% if 'moliya' in request.resolver_match.url_name %}active{% endif %}">
        <i class="fas fa-wallet me-2"></i>Moliya
    </a>
    <div class="nav-section">Sayt</div>
    <a href="{% url 'home' %}" class="nav-link d-block">
        <i class="fas fa-home me-2"></i>Bosh sahifa
    </a>
</div>
<div class="main-content">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
