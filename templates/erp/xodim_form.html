{% extends 'erp/base.html' %}
{% block title %}{{ sarlavha }}{% endblock %}
{% block content %}
<div class="page-header">
    <a href="{% url 'erp:xodimlar' %}" class="text-muted small text-decoration-none"><i class="fas fa-arrow-left me-1"></i>Xodimlar</a>
    <h4 class="mb-0 mt-1">{{ sarlavha }}</h4>
</div>
<div class="card p-4" style="max-width:600px">
    <form method="post">
        {% csrf_token %}
        <div class="row g-3">
            <div class="col-md-6"><label class="form-label fw-semibold">Ism</label>{{ form.ism }}</div>
            <div class="col-md-6"><label class="form-label fw-semibold">Familiya</label>{{ form.familiya }}</div>
            <div class="col-md-6"><label class="form-label fw-semibold">Lavozim</label>{{ form.lavozim }}</div>
            <div class="col-md-6"><label class="form-label fw-semibold">Telefon</label>{{ form.telefon }}</div>
            <div class="col-md-6"><label class="form-label fw-semibold">Email</label>{{ form.email }}</div>
            <div class="col-md-6"><label class="form-label fw-semibold">Maosh (so'm)</label>{{ form.maosh }}</div>
            <div class="col-12">
                <div class="form-check">{{ form.faolmi }} <label class="form-check-label">Faol xodim</label></div>
            </div>
        </div>
        <div class="d-flex gap-2 mt-4">
            <button type="submit" class="btn btn-amber"><i class="fas fa-save me-1"></i>Saqlash</button>
            <a href="{% url 'erp:xodimlar' %}" class="btn btn-outline-secondary">Bekor qilish</a>
        </div>
    </form>
</div>
{% endblock %}
