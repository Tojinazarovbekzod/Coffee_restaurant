<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CRM{% endblock %} | Brew & Bloom</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
        .sidebar {
            min-height: 100vh;
            background: linear-gradient(180deg, #2c1810 0%, #4a2c1a 100%);
            width: 240px;
            position: fixed;
            top: 0; left: 0;
            z-index: 100;
            padding-top: 1rem;
        }
        .sidebar .brand { color: #d4a762; font-weight: 700; font-size: 1.1rem; padding: 1rem 1.5rem 1.5rem; border-bottom: 1px solid #4a3020; }
        .sidebar .nav-link { color: #c9b99a; padding: .6rem 1.5rem; border-radius: 0; font-size: .9rem; }
        .sidebar .nav-link:hover, .sidebar .nav-link.active { color: #fff; background: rgba(212,167,98,.15); border-left: 3px solid #d4a762; }
        .sidebar .nav-section { color: #8a7060; font-size: .7rem; text-transform: uppercase; letter-spacing: .1em; padding: 1rem 1.5rem .3rem; }
        .main-content { margin-left: 240px; padding: 2rem; }
        .card { border: none; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
        .stat-card { border-radius: 12px; padding: 1.5rem; color: white; }
        .page-header { background: white; border-radius: 12px; padding: 1.5rem 2rem; margin-bottom: 1.5rem; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
        .btn-brown { background: #8b4513; color: white; border: none; }
        .btn-brown:hover { background: #6b3410; color: white; }
        .badge-tashrif { background: #198754; }
        .badge-qongiroq { background: #0d6efd; }
        .badge-email { background: #6610f2; }
        .badge-izoh { background: #6c757d; }
        .sidebar-footer { position: absolute; bottom: 0; left: 0; right: 0; padding: 1rem 1.5rem; border-top: 1px solid #4a3020; }
        .user-info { color: #c9b99a; font-size: .82rem; display: flex; align-items: center; gap: .5rem; margin-bottom: .6rem; }
        .user-info i { color: #d4a762; }
        .btn-logout { display: flex; align-items: center; gap: .5rem; width: 100%; background: rgba(212,167,98,.12); border: 1px solid rgba(212,167,98,.25); color: #d4a762; border-radius: 8px; padding: .45rem .85rem; font-size: .82rem; font-family: inherit; cursor: pointer; text-decoration: none; transition: background .2s; }
        .btn-logout:hover { background: rgba(212,167,98,.22); color: #fff; }
    </style>
</head>
<body>
<div class="sidebar">
    <div class="brand"><i class="fas fa-mug-hot me-2"></i>Brew & Bloom</div>
    <div class="nav-section">CRM</div>
    <a href="{% url 'crm:dashboard' %}" class="nav-link d-block {% if request.resolver_match.url_name == 'dashboard' %}active{% endif %}">
        <i class="fas fa-tachometer-alt me-2"></i>Boshqaruv paneli
    </a>
    <a href="{% url 'crm:mijozlar' %}" class="nav-link d-block {% if 'mijoz' in request.resolver_match.url_name %}active{% endif %}">
        <i class="fas fa-users me-2"></i>Mijozlar
    </a>
    <div class="nav-section">ERP</div>
    <a href="{% url 'erp:dashboard' %}" class="nav-link d-block">
        <i class="fas fa-chart-line me-2"></i>ERP Paneli
    </a>
    <a href="{% url 'erp:mahsulotlar' %}" class="nav-link d-block">
        <i class="fas fa-boxes me-2"></i>Inventar
    </a>
    <a href="{% url 'erp:buyurtmalar' %}" class="nav-link d-block">
        <i class="fas fa-receipt me-2"></i>Buyurtmalar
    </a>
    <a href="{% url 'erp:xodimlar' %}" class="nav-link d-block">
        <i class="fas fa-id-badge me-2"></i>Xodimlar
    </a>
    <a href="{% url 'erp:moliya' %}" class="nav-link d-block">
        <i class="fas fa-wallet me-2"></i>Moliya
    </a>
    <div class="sidebar-footer">
        <div class="user-info">
            <i class="fas fa-circle-user"></i>
            <span>{{ request.user.username }}</span>
        </div>
        <form action="{% url 'logout' %}" method="post" style="width:100%;">
            {% csrf_token %}
            <button type="submit" class="btn-logout">
                <i class="fas fa-right-from-bracket"></i> Chiqish
            </button>
        </form>
    </div>
</div>
<div class="main-content">
    {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
